<!DOCTYPE html>
<html lang="id" class="h-full bg-slate-50 dark:bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wedding Dashboard Admin</title>
    <link rel="icon" type="image/png" href="img/favicon.png?v=2">
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'Inter', 'sans-serif'],
                    },
                    borderRadius: {
                        '3xl': '1.5rem',
                    }
                }
            }
        }

        // Dark Mode Initialization
        if (localStorage.getItem('admin-theme') === 'dark' || (!('admin-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        @layer components {
            .card-premium {
                @apply bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl transition-all;
                box-shadow: none !important;
            }

            .card-premium:hover {
                @apply !border-blue-500 !ring-4 !ring-blue-500;
                box-shadow: none !important;
            }

            .input-premium {
                @apply w-full bg-white border border-slate-200 rounded-lg px-3 py-3.5 text-sm font-medium transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 placeholder:text-slate-300;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="h-full flex items-center justify-center font-sans antialiased text-slate-800 dark:text-slate-200">
    
    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-[9999] space-y-2 flex flex-col items-end pointer-events-none"></div>

    <div class="w-full px-4 max-w-md mx-auto">
        <div class="bg-white dark:bg-slate-900 card-premium p-10 relative overflow-hidden w-full">
            <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-50 dark:bg-indigo-900/20 rounded-full -mr-16 -mt-16 opacity-50 font-bold"></div>
            <div class="relative z-10">
                <div class="text-center mb-10">
                    <div class="w-16 h-16 bg-indigo-600 text-white rounded-2xl mx-auto flex items-center justify-center text-2xl mb-4 shadow-lg shadow-indigo-600/30">
                        <i class="fas fa-lock"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-900 dark:text-white" data-i18n="login_title">Area Terlindungi</h3>
                    <p class="text-slate-500 dark:text-slate-400 text-sm mt-2" data-i18n="login_subtitle">Masuk untuk mengelola portal masa pernikahan Anda</p>
                </div>
                <form id="loginForm" class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-[11px] sm:text-xs font-semibold text-slate-600 dark:text-slate-400 px-1" data-i18n="login_id">Email / Username</label>
                        <input id="loginUsername" type="text" data-i18n-placeholder="login_id_ph" placeholder="Masukkan email atau username" class="input-premium dark:bg-slate-800 dark:border-slate-700 dark:text-white" autocomplete="username" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] sm:text-xs font-semibold text-slate-600 dark:text-slate-400 px-1" data-i18n="login_key">Password</label>
                        <div class="relative group/pass">
                            <input id="loginPassword" type="password" data-i18n-placeholder="login_key_ph" placeholder="••••••••" class="input-premium pr-12 dark:bg-slate-800 dark:border-slate-700 dark:text-white" autocomplete="current-password" required>
                            <button type="button" onclick="togglePasswordVisibility('loginPassword', 'eyeIcon')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 transition-colors focus:outline-none">
                                <i id="eyeIcon" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button id="loginButton" type="submit" class="w-full h-14 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl transition-all flex items-center justify-center gap-3 mt-6 active:scale-[0.98] shadow-lg shadow-indigo-600/20">
                        <span data-i18n="login_btn">Login</span>
                        <i class="fas fa-chevron-right text-[10px] opacity-40"></i>
                    </button>
                    <div class="text-center mt-4">
                        <a href="#" class="text-xs text-indigo-500 hover:text-indigo-400 font-medium transition-colors" data-i18n="login_forgot">Lupa password?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgClass = 'bg-white';
            let textClass = 'text-slate-800';
            let icon = 'fa-info-circle text-blue-500';
            
            if (type === 'success') {
                icon = 'fa-check-circle text-emerald-500';
            } else if (type === 'error') {
                icon = 'fa-exclamation-circle text-rose-500';
            } else if (type === 'warning') {
                icon = 'fa-exclamation-triangle text-amber-500';
            }
            
            toast.className = `flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg border border-slate-100 ${bgClass} transform transition-all duration-300 translate-x-full opacity-0 max-w-sm w-full`;
            toast.innerHTML = `
                <i class="fas ${icon} text-lg shrink-0"></i>
                <p class="${textClass} text-sm font-medium leading-snug">${message}</p>
                <button class="ml-auto text-slate-400 hover:text-slate-600 focus:outline-none p-1 shrink-0" onclick="this.parentElement.remove()">
                    <i class="fas fa-times text-xs"></i>
                </button>
            `;
            
            container.appendChild(toast);
            
            // Animate in
            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
            }, 10);
            
            // Remove after 3 seconds
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginButton');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginUsername').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showToast('Login berhasil', 'success');
                    setTimeout(() => {
                        window.location.href = '/admin'; // Redirect to new admin route
                    }, 500);
                } else {
                    showToast(data.error || 'Login gagal', 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalHtml;
                }
            } catch (err) {
                showToast('Koneksi gagal', 'error');
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        });
    </script>
</body>
</html>
