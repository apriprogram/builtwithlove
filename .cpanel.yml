# .cpanel.yml - cPanel deployment configuration
# This file deploys the repository to your hosting directory on the cPanel server.
# Update DEPLOY_DIR if your hosting path differs.

deployment:
  tasks:
    - export DEPLOY_DIR="/home/tanjunak/public/builtwithlove.my.id"
    - /usr/bin/rsync -a --delete --exclude='.git' ./ "$DEPLOY_DIR"

# Notes:
# - Ensure in cPanel Git™ Version Control the repository has a checked-out branch (e.g. 'main').
# - Ensure there are no uncommitted changes on the server working tree.
# - If your hosting uses a different folder (public_html or riandanaurora.my.id), replace DEPLOY_DIR above.
